<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a252f" />
      <stop offset="100%" stop-color="#11181f" />
    </linearGradient>
    
    <!-- Accent Orange Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e67e22" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>

    <!-- Tool White/Gray Gradient -->
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0e0e0" />
    </linearGradient>

    <!-- Drop Shadow for Depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Base (rounded for modern app icon style) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer Glow Ring -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-opacity="0.3" />

  <!-- Main Graphic Container with Shadow -->
  <g filter="url(#dropShadow)">
    <!-- Stylized Modern House Structure -->
    <path d="M 256,110 L 400,225 L 360,225 L 360,370 L 152,370 L 152,225 L 112,225 Z" fill="none" stroke="url(#accentGrad)" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- Combined Hammer & Ruler/Wrench Icon inside the House -->
    <!-- Hammer Handle -->
    <rect x="244" y="220" width="24" height="110" rx="6" fill="url(#toolGrad)" transform="rotate(-30 256 275)" />
    <!-- Hammer Head -->
    <path d="M 210,210 L 290,170 L 280,150 L 200,190 Z" fill="url(#toolGrad)" transform="rotate(-30 256 275)" />
    <!-- Hammer Claw back and Flat front -->
    <path d="M 195,190 C 180,195 170,210 175,225 L 210,210 Z" fill="url(#toolGrad)" transform="rotate(-30 256 275)" />

    <!-- Brick lines at the foundation -->
    <line x1="180" y1="330" x2="332" y2="330" stroke="url(#toolGrad)" stroke-width="8" stroke-linecap="round" opacity="0.8" />
    <line x1="200" y1="300" x2="312" y2="300" stroke="url(#toolGrad)" stroke-width="8" stroke-linecap="round" opacity="0.8" />
    <line x1="256" y1="300" x2="256" y2="330" stroke="url(#toolGrad)" stroke-width="8" opacity="0.8" />
  </g>

  <!-- Accent Circle Badge in top right corner -->
  <circle cx="410" cy="102" r="28" fill="url(#accentGrad)" />
  <!-- Lettering or tiny icon inside the badge -->
  <text x="410" y="112" font-family="'Barlow', sans-serif" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle">N</text>

</svg>
